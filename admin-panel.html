<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlantic Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #fff;
            min-height: 100vh;
        }
        
        /* Login Overlay */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: all 0.3s;
        }
        
        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 2.5rem;
            width: 400px;
            max-width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-card h2 {
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #6366f1, #10b981);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .login-card .input-group {
            margin-bottom: 1.5rem;
        }
        
        .login-card input {
            width: 100%;
            padding: 1rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
        }
        
        .login-card input:focus {
            outline: none;
            border-color: #6366f1;
        }
        
        .login-card button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .login-card button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99,102,241,0.3);
        }
        
        .login-error {
            color: #ef4444;
            text-align: center;
            margin-top: 1rem;
            font-size: 0.875rem;
        }
        
        /* Main Content */
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .logo i { color: #6366f1; }
        
        .admin-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .profile-card-small {
            background: rgba(99,102,241,0.2);
            padding: 0.5rem 1rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-logout {
            background: rgba(239,68,68,0.2);
            border: 1px solid rgba(239,68,68,0.3);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            color: #ef4444;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-logout:hover {
            background: rgba(239,68,68,0.4);
        }
        
        /* Grid Layout */
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 1.5rem;
        }
        
        @media (max-width: 768px) {
            .admin-grid { grid-template-columns: 1fr; }
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 1.5rem;
            transition: all 0.3s;
        }
        
        .card:hover { transform: translateY(-3px); border-color: rgba(99,102,241,0.5); }
        
        .card h3 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .card h3 i { color: #6366f1; }
        
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #94a3b8; font-size: 0.875rem; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 0.875rem;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #6366f1;
        }
        
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none;
            padding: 0.875rem;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(99,102,241,0.3); }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.75rem;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-badge.success { background: rgba(16,185,129,0.2); color: #10b981; }
        .status-badge.pending { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .status-badge.failed { background: rgba(239,68,68,0.2); color: #ef4444; }
        
        .bank-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .bank-item {
            padding: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .bank-item:hover {
            background: rgba(99,102,241,0.2);
            padding-left: 1rem;
        }
        .bank-code { color: #6366f1; font-family: monospace; }
        
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 2001;
        }
        .toast.show { transform: translateX(0); }
        .toast.success .toast-icon i { color: #10b981; }
        .toast.error .toast-icon i { color: #ef4444; }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .hidden { display: none; }
        
        .quick-amounts {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .quick-amount {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .quick-amount:hover { background: #6366f1; }
    </style>
</head>
<body>

<!-- Login Overlay -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h2><i class="fas fa-shield-alt"></i> Admin Panel</h2>
        <div class="input-group">
            <input type="text" id="loginUsername" placeholder="Username" autocomplete="off">
        </div>
        <div class="input-group">
            <input type="password" id="loginPassword" placeholder="Password">
        </div>
        <button id="loginBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
        <div id="loginError" class="login-error"></div>
    </div>
</div>

<!-- Main Admin Content -->
<div id="adminContent" class="admin-container hidden">
    <div class="admin-header">
        <div class="logo">
            <i class="fas fa-crown"></i>
            <span>Atlantic<span style="color:#6366f1">Admin</span></span>
        </div>
        <div class="admin-info">
            <div class="profile-card-small" id="adminProfilePreview">
                <i class="fas fa-user-circle"></i>
                <span id="adminName">Admin</span>
            </div>
            <button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>
    
    <div class="admin-grid">
        <!-- Profile Card -->
        <div class="card">
            <h3><i class="fas fa-user"></i> Profile Atlantic</h3>
            <div id="profileInfo">
                <div class="info-row"><span><i class="fas fa-user"></i> Nama:</span><strong id="profileName">-</strong></div>
                <div class="info-row"><span><i class="fas fa-at"></i> Username:</span><strong id="profileUsername">-</strong></div>
                <div class="info-row"><span><i class="fas fa-envelope"></i> Email:</span><strong id="profileEmail">-</strong></div>
                <div class="info-row"><span><i class="fas fa-phone"></i> Phone:</span><strong id="profilePhone">-</strong></div>
                <div class="info-row"><span><i class="fas fa-wallet"></i> Balance:</span><strong id="profileBalance" style="color:#10b981;">-</strong></div>
                <div class="info-row"><span><i class="fas fa-circle"></i> Status:</span><span id="profileStatus">-</span></div>
            </div>
            <button class="btn-secondary" id="refreshProfileBtn" style="margin-top: 1rem;"><i class="fas fa-sync-alt"></i> Refresh Profile</button>
        </div>
        
        <!-- Transfer Card -->
        <div class="card">
            <h3><i class="fas fa-paper-plane"></i> Transfer Dana</h3>
            <div class="form-group">
                <label>Reference ID (Unik)</label>
                <input type="text" id="transferRefId" placeholder="Contoh: TRX001">
            </div>
            <div class="form-group">
                <label>Kode Bank <span id="selectedBankCode" style="color:#6366f1;"></span></label>
                <select id="transferBankCode">
                    <option value="">Pilih Bank...</option>
                </select>
                <button class="btn-secondary" id="loadBanksBtn" style="margin-top: 0.5rem; width: 100%;"><i class="fas fa-database"></i> Load Daftar Bank</button>
            </div>
            <div class="form-group">
                <label>Nomor Rekening</label>
                <input type="text" id="transferAccount" placeholder="Masukkan nomor rekening">
            </div>
            <div class="form-group">
                <label>Nama Penerima</label>
                <input type="text" id="transferName" placeholder="Nama lengkap penerima">
            </div>
            <div class="form-group">
                <label>Nominal (Rp)</label>
                <input type="number" id="transferAmount" placeholder="Minimal 10.000">
                <div class="quick-amounts">
                    <span class="quick-amount" data-amount="10000">10K</span>
                    <span class="quick-amount" data-amount="50000">50K</span>
                    <span class="quick-amount" data-amount="100000">100K</span>
                    <span class="quick-amount" data-amount="500000">500K</span>
                    <span class="quick-amount" data-amount="1000000">1JT</span>
                </div>
            </div>
            <div class="form-group">
                <label>Catatan (Opsional)</label>
                <input type="text" id="transferNote" placeholder="Catatan transfer">
            </div>
            <button class="btn-primary" id="transferBtn"><i class="fas fa-paper-plane"></i> Proses Transfer</button>
        </div>
        
        <!-- Cek Rekening Card -->
        <div class="card">
            <h3><i class="fas fa-search"></i> Cek Rekening</h3>
            <div class="form-group">
                <label>Kode Bank</label>
                <input type="text" id="checkBankCode" placeholder="bca, mandiri, bri, dll">
            </div>
            <div class="form-group">
                <label>Nomor Rekening</label>
                <input type="text" id="checkAccountNumber" placeholder="Nomor rekening tujuan">
            </div>
            <button class="btn-primary" id="checkAccountBtn"><i class="fas fa-search"></i> Cek Rekening</button>
            <div id="checkAccountResult" style="margin-top: 1rem; display: none;">
                <div class="info-row"><span>Status:</span><span id="checkResultStatus">-</span></div>
                <div class="info-row"><span>Nama Pemilik:</span><strong id="checkResultName">-</strong></div>
            </div>
        </div>
        
        <!-- Daftar Bank Card -->
        <div class="card">
            <h3><i class="fas fa-university"></i> Daftar Bank</h3>
            <div id="bankListContainer" class="bank-list">
                <p style="text-align:center; padding:1rem;">Klik "Load Daftar Bank" untuk melihat</p>
            </div>
            <button class="btn-secondary" id="refreshBanksBtn" style="margin-top: 1rem;"><i class="fas fa-sync-alt"></i> Refresh Daftar Bank</button>
        </div>
    </div>
</div>

<div id="toast" class="toast">
    <div class="toast-icon"><i class="fas fa-check-circle"></i></div>
    <div class="toast-message"></div>
</div>

<script>
// ==================== KONFIGURASI ====================
const API_BASE = window.location.origin;
let isAdminLoggedIn = false;

// ==================== UTILITY ====================
function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.className = `toast ${type}`;
    toast.querySelector('.toast-message').textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

function formatRupiah(num) {
    return `Rp ${new Intl.NumberFormat('id-ID').format(num)}`;
}

// ==================== AUTHENTICATION ====================
async function checkAuth() {
    try {
        const response = await fetch(`${API_BASE}/api/admin/check`, {
            credentials: 'include'
        });
        const result = await response.json();
        
        if (result.isAdmin) {
            isAdminLoggedIn = true;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('adminContent').classList.remove('hidden');
            loadProfile();
            loadBankList();
        } else {
            isAdminLoggedIn = false;
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('adminContent').classList.add('hidden');
        }
    } catch (error) {
        console.error('Check auth error:', error);
    }
}

async function adminLogin() {
    const username = document.getElementById('loginUsername').value;
    const password = document.getElementById('loginPassword').value;
    const errorDiv = document.getElementById('loginError');
    
    if (!username || !password) {
        errorDiv.textContent = 'Username dan password harus diisi';
        return;
    }
    
    errorDiv.textContent = '';
    
    try {
        const response = await fetch(`${API_BASE}/api/admin/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
            credentials: 'include'
        });
        
        const result = await response.json();
        
        if (result.success) {
            showToast('Login berhasil!', 'success');
            checkAuth();
        } else {
            errorDiv.textContent = result.message || 'Login gagal';
        }
    } catch (error) {
        errorDiv.textContent = 'Terjadi kesalahan';
        console.error('Login error:', error);
    }
}

async function adminLogout() {
    try {
        await fetch(`${API_BASE}/api/admin/logout`, {
            method: 'POST',
            credentials: 'include'
        });
        isAdminLoggedIn = false;
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('adminContent').classList.add('hidden');
        showToast('Logout berhasil', 'success');
    } catch (error) {
        console.error('Logout error:', error);
    }
}

// ==================== PROFILE ====================
async function loadProfile() {
    try {
        const response = await fetch(`${API_BASE}/api/admin/profile`, {
            credentials: 'include'
        });
        const result = await response.json();
        
        if (result.success && result.data) {
            document.getElementById('profileName').textContent = result.data.name || '-';
            document.getElementById('profileUsername').textContent = result.data.username || '-';
            document.getElementById('profileEmail').textContent = result.data.email || '-';
            document.getElementById('profilePhone').textContent = result.data.phone || '-';
            document.getElementById('profileBalance').textContent = formatRupiah(result.data.balance || 0);
            document.getElementById('profileStatus').innerHTML = `<span class="status-badge ${result.data.status === 'active' ? 'success' : 'pending'}">${result.data.status || 'active'}</span>`;
            document.getElementById('adminName').textContent = result.data.username || 'Admin';
        }
    } catch (error) {
        console.error('Load profile error:', error);
        showToast('Gagal load profile', 'error');
    }
}

// ==================== BANK LIST ====================
async function loadBankList() {
    const container = document.getElementById('bankListContainer');
    const bankSelect = document.getElementById('transferBankCode');
    
    container.innerHTML = '<div class="loading" style="margin:1rem auto;"></div><p style="text-align:center">Memuat...</p>';
    
    try {
        const response = await fetch(`${API_BASE}/api/admin/banks`, {
            credentials: 'include'
        });
        const result = await response.json();
        
        if (result.success && result.data) {
            const banks = result.data;
            container.innerHTML = '';
            bankSelect.innerHTML = '<option value="">Pilih Bank...</option>';
            
            banks.forEach(bank => {
                // Bank list display
                const bankItem = document.createElement('div');
                bankItem.className = 'bank-item';
                bankItem.innerHTML = `<strong>${bank.bank_name}</strong> <span class="bank-code">(${bank.bank_code})</span>`;
                bankItem.onclick = () => {
                    document.getElementById('transferBankCode').value = bank.bank_code;
                    document.getElementById('selectedBankCode').textContent = `✓ ${bank.bank_code}`;
                    document.getElementById('checkBankCode').value = bank.bank_code;
                    showToast(`Bank dipilih: ${bank.bank_name}`, 'info');
                };
                container.appendChild(bankItem);
                
                // Bank select option
                const option = document.createElement('option');
                option.value = bank.bank_code;
                option.textContent = `${bank.bank_name} (${bank.bank_code})`;
                bankSelect.appendChild(option);
            });
        } else {
            container.innerHTML = '<p style="text-align:center; color:#ef4444;">Gagal load daftar bank</p>';
        }
    } catch (error) {
        console.error('Load banks error:', error);
        container.innerHTML = '<p style="text-align:center; color:#ef4444;">Error load bank list</p>';
        showToast('Gagal load daftar bank', 'error');
    }
}

// ==================== CHECK ACCOUNT ====================
async function checkAccount() {
    const bankCode = document.getElementById('checkBankCode').value.trim();
    const accountNumber = document.getElementById('checkAccountNumber').value.trim();
    const resultDiv = document.getElementById('checkAccountResult');
    
    if (!bankCode || !accountNumber) {
        showToast('Isi kode bank dan nomor rekening', 'error');
        return;
    }
    
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = '<div class="loading"></div><p>Memeriksa...</p>';
    
    try {
        const response = await fetch(`${API_BASE}/api/admin/check-account`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ bank_code: bankCode, account_number: accountNumber }),
            credentials: 'include'
        });
        
        const result = await response.json();
        
        if (result.success) {
            resultDiv.innerHTML = `
                <div class="info-row"><span>Status:</span><span class="status-badge success">✓ VALID</span></div>
                <div class="info-row"><span>Nama Pemilik:</span><strong>${result.data.account_name}</strong></div>
            `;
            showToast(`Rekening valid: ${result.data.account_name}`, 'success');
        } else {
            resultDiv.innerHTML = `
                <div class="info-row"><span>Status:</span><span class="status-badge failed">✗ INVALID</span></div>
                <div class="info-row"><span>Pesan:</span><span>${result.message}</span></div>
            `;
            showToast(result.message, 'error');
        }
    } catch (error) {
        console.error('Check account error:', error);
        resultDiv.innerHTML = '<div class="info-row"><span>Error checking account</span></div>';
        showToast('Gagal cek rekening', 'error');
    }
}

// ==================== TRANSFER ====================
async function processTransfer() {
    const refId = document.getElementById('transferRefId').value.trim();
    const bankCode = document.getElementById('transferBankCode').value;
    const account = document.getElementById('transferAccount').value.trim();
    const name = document.getElementById('transferName').value.trim();
    const amount = parseInt(document.getElementById('transferAmount').value);
    const note = document.getElementById('transferNote').value;
    
    if (!refId) {
        showToast('Reference ID diperlukan', 'error');
        return;
    }
    if (!bankCode) {
        showToast('Pilih bank tujuan', 'error');
        return;
    }
    if (!account) {
        showToast('Nomor rekening diperlukan', 'error');
        return;
    }
    if (!name) {
        showToast('Nama penerima diperlukan', 'error');
        return;
    }
    if (!amount || amount < 10000) {
        showToast('Nominal minimal Rp 10.000', 'error');
        return;
    }
    if (amount > 100000000) {
        showToast('Nominal maksimal Rp 100.000.000', 'error');
        return;
    }
    
    const btn = document.getElementById('transferBtn');
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<div class="loading"></div> Memproses...';
    
    try {
        const response = await fetch(`${API_BASE}/api/admin/transfer`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                ref_id: refId,
                kode_bank: bankCode,
                nomor_akun: account,
                nama_pemilik: name,
                nominal: amount,
                note: note
            }),
            credentials: 'include'
        });
        
        const result = await response.json();
        
        if (result.success) {
            const fee = Math.max(2000, Math.round(amount * 0.1));
            const total = amount + fee;
            
            showToast(`Transfer berhasil! ID: ${result.data.id}`, 'success');
            
            // Clear form
            document.getElementById('transferRefId').value = '';
            document.getElementById('transferAccount').value = '';
            document.getElementById('transferName').value = '';
            document.getElementById('transferAmount').value = '';
            document.getElementById('transferNote').value = '';
            
            // Show success dialog
            alert(`✅ TRANSFER BERHASIL\n\nID: ${result.data.id}\nRef ID: ${result.data.reff_id}\nStatus: ${result.data.status}\nNama: ${result.data.name}\nNominal: ${formatRupiah(amount)}\nFee: ${formatRupiah(fee)}\nTotal: ${formatRupiah(total)}`);
            
            loadProfile(); // Refresh balance
        } else {
            showToast(result.message || 'Transfer gagal', 'error');
        }
    } catch (error) {
        console.error('Transfer error:', error);
        showToast('Gagal memproses transfer', 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
    }
}

// ==================== QUICK AMOUNT ====================
document.querySelectorAll('.quick-amount').forEach(btn => {
    btn.addEventListener('click', () => {
        const amount = btn.getAttribute('data-amount');
        document.getElementById('transferAmount').value = amount;
    });
});

// ==================== EVENT LISTENERS ====================
document.getElementById('loginBtn').addEventListener('click', adminLogin);
document.getElementById('logoutBtn').addEventListener('click', adminLogout);
document.getElementById('refreshProfileBtn').addEventListener('click', loadProfile);
document.getElementById('loadBanksBtn').addEventListener('click', loadBankList);
document.getElementById('refreshBanksBtn').addEventListener('click', loadBankList);
document.getElementById('checkAccountBtn').addEventListener('click', checkAccount);
document.getElementById('transferBtn').addEventListener('click', processTransfer);

// Enter key on login
document.getElementById('loginPassword').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') adminLogin();
});

// Check auth on load
checkAuth();
</script>
